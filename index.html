<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chogan Perfume Catalogue</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #657282;
      --line: #dde4ec;
      --paper: #fbfcfd;
      --white: #ffffff;
      --pink: #d12f8a;
      --blue: #1877a6;
      --green: #208261;
      --gold: #a66b15;
      --red: #b64242;
      --shadow: 0 10px 28px rgba(24, 38, 55, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.35;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 18px 48px;
    }

    header {
      margin-bottom: 12px;
    }

    .intro, .notice {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 16px 18px;
      display: grid;
      gap: 8px;
    }

    .brandline {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      color: var(--muted);
      font-size: 13px;
      background: #f7f9fb;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 74ch;
      font-size: 16px;
    }

    .catalogue-shell {
      display: block;
    }

    .tools {
      margin: 0 0 22px;
      display: grid;
      gap: 0;
      background: transparent;
    }

    .top-menu {
      display: flex;
      gap: 18px;
      flex-wrap: nowrap;
      align-items: center;
      min-width: 0;
    }

    .menu-btn {
      min-height: 44px;
      padding: 0;
      border: 0;
      border-radius: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #627285;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .menu-btn .menu-count {
      display: inline-grid;
      min-width: 20px;
      height: 20px;
      margin-left: 6px;
      place-items: center;
      border-radius: 999px;
      background: #243447;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }

    .menu-btn:hover {
      color: #1f2933;
    }

    .menu-btn.active {
      color: #1f2933;
      border-bottom-color: #1f2933;
      background: transparent;
    }

    .menu-btn.active .menu-count {
      background: #1f2933;
      color: #fff;
    }

    .page-view[hidden] {
      display: none;
    }

    .selection-panel {
      max-width: 760px;
      display: grid;
      gap: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .bag-page .selection-panel {
      margin-top: 18px;
    }

    .selection-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .selection-head h2 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
    }

    .selection-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-count {
      min-width: 34px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #29364a;
      font-weight: 900;
    }

    .selection-list {
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .selection-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .selection-item {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
    }

    .selection-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .selection-name {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .selection-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-price {
      text-align: right;
      font-size: 12px;
      font-weight: 900;
    }

    .selection-price span { display: block; color: var(--muted); font-size: 10px; font-weight: 700; }
    .selection-price strong { display: block; }

    .qty-row, .selection-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qty-btn {
      width: 32px;
      min-height: 32px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .qty-value {
      min-width: 26px;
      text-align: center;
      font-weight: 900;
    }

    .remove-btn {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-total {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      font-weight: 900;
    }

    .selection-actions button {
      flex: 1 1 auto;
    }

    .store-tabs {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 8;
      margin: 0 -18px;
      padding: 12px 18px;
      background: rgba(251, 252, 253, .98);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .filter-row {
      display: grid;
      gap: 12px;
      padding-top: 14px;
    }

    .toolbar-row {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) repeat(3, minmax(136px, auto)) auto;
      gap: 8px;
      align-items: center;
    }

    .store-tabs {
      justify-content: space-between;
    }

    .view-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .store-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .list-link {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #1f2933;
      font-size: 14px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .list-link .menu-count {
      min-width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: #29364a;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }

    .list-link.active {
      border-color: #1f2933;
      background: #1f2933;
      color: #fff;
    }

    .list-icon {
      width: 16px;
      height: 16px;
      display: block;
    }

    .list-text {
      white-space: nowrap;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .field label {
      display: none;
    }

    .search, .filter-select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
    }

    .clear-filters {
      min-height: 42px;
      border-color: transparent;
      padding-inline: 8px;
      color: #536174;
      background: transparent;
      font-size: 12px;
    }

    .clear-filters[hidden] { display: none; }

    .filter-chip-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }

    .filter-chip-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      min-height: 32px;
      border-radius: 999px;
      padding: 0 13px;
      color: #4f5d70;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .filter-chip:hover { border-color: #aeb9c6; }
    .filter-chip.active {
      border-color: #29364a;
      color: #fff;
      background: #29364a;
    }

    .filter-chip:disabled {
      display: none;
    }

    .filter-summary {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .toolbar-row {
      padding-top: 2px;
    }

    .filter-summary[hidden] { display: block; visibility: hidden; }

    .mobile-utility-row,
    .mobile-filters-panel,
    .mobile-sort-panel {
      display: none;
    }

    .mobile-clear-filters { width: 100%; color: #536174; background: #f7f8fa; }

    .bag-close {
      display: none;
      min-width: 36px;
      width: 36px;
      min-height: 36px;
      padding: 0;
      font-size: 22px;
      line-height: 1;
    }

    .subsection {
      margin-top: 16px;
    }

    .subsection:first-child {
      margin-top: 0;
    }

    .subsection-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
      padding-top: 4px;
    }

    .subsection-head h3 {
      margin: 0;
      font-size: 15px;
      text-transform: uppercase;
      color: #334155;
    }

    .subsection-head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    button.active {
      color: #fff;
      border-color: #29364a;
      background: #29364a;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 18px;
    }

    .summary div {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .summary strong {
      display: block;
      font-size: 24px;
    }

    .summary span {
      color: var(--muted);
      font-size: 13px;
    }

    section { margin-top: 28px; }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      border-left: 5px solid var(--section-color, #d9e1ea);
      background: var(--section-bg, transparent);
      border-radius: 0;
      margin-bottom: 12px;
      padding: 8px 2px 10px 12px;
      color: var(--ink);
    }

    .section-title h2 {
      margin: 0;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .section-title span { color: var(--muted); font-size: 14px; }
    .femme { --section-color: #c85a95; --section-bg: #fff7fb; }
    .homme { --section-color: #3f83a8; --section-bg: #f5fbff; }
    .mixte { --section-color: #4f9a7d; --section-bg: #f5fcf8; }
    .luxe { --section-color: #b58a3b; --section-bg: #fffaf0; }
    .luxury { --section-color: #a85a5a; --section-bg: #fff7f7; }
    .body { --section-color: #6b7885; --section-bg: #f7f9fb; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px 14px;
    }

    .card {
      background: #f7f8fa;
      border: 1px solid #e5e9ee;
      border-radius: 8px;
      padding: 10px 10px 14px;
      min-height: 248px;
      display: grid;
      gap: 12px;
      align-content: start;
      position: relative;
      overflow: hidden;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }

    .card:hover {
      border-color: #cdd5de;
      box-shadow: 0 4px 14px rgba(32, 44, 59, .05);
      transform: translateY(-2px);
    }

    .product-photo {
      height: 210px;
      border: 0;
      border-radius: 6px;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .reference-img {
      width: 100%;
      height: 210px;
      object-fit: contain;
      padding: 16px;
      background: #fff;
      display: block;
    }

    .photo-code { position: absolute; z-index: 1; top: 9px; right: 9px; }

    .bottle {
      width: 56px;
      height: 94px;
      position: relative;
      border-radius: 10px 10px 16px 16px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.38), transparent 25% 70%, rgba(0,0,0,.08)),
        linear-gradient(180deg, #eef2f6, #6d7886);
      box-shadow: 0 16px 24px rgba(30, 43, 60, .18);
    }

    .bottle::before {
      content: "";
      position: absolute;
      left: 18px;
      top: -19px;
      width: 20px;
      height: 22px;
      border-radius: 4px 4px 2px 2px;
      background: #f7f9fb;
      border: 1px solid rgba(31, 41, 51, .12);
    }

    .bottle::after {
      content: "Z";
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: 34px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      background: rgba(255,255,255,.82);
      color: #29364a;
      font-weight: 900;
      font-size: 17px;
    }

    .num {
      min-width: 38px;
      height: 25px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      color: #fff;
      background: #29364a;
      padding: 0 7px;
      font-weight: 800;
      font-size: 11px;
    }

    .product { min-width: 0; }

    .product-head {
      display: block;
    }

    .name {
      margin: 0 0 4px;
      font-weight: 800;
      text-transform: none;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .maker {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .chogan-product {
      margin: 6px 0 0;
      color: #667386;
      font-size: 12px;
      line-height: 1.35;
    }

    .chogan-product strong {
      color: #4e5d6f;
      font-weight: 700;
      margin-right: 4px;
    }

    .card-status-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 8px;
    }

    .new-layer-label {
      color: #8a365f;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .purchase-row {
      display: grid;
      gap: 9px;
      margin-top: 13px;
      padding-top: 11px;
      border-top: 1px solid #edf0f3;
    }

    .format-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .format-chip {
      min-height: 29px;
      flex: 0 0 auto;
      border-radius: 6px;
      padding: 0 8px;
      background: #fff;
      color: #344154;
      font-size: 11px;
      font-weight: 800;
    }

    .format-chip.selected { color: #fff; border-color: #29364a; background: #29364a; }

    .price-teaser { color: #263448; font-size: 16px; font-weight: 800; }

    .card-buy-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .card-qty {
      display: grid;
      grid-template-columns: 30px 28px 30px;
      align-items: center;
      border: 1px solid #dce2e8;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .card-qty-btn {
      min-height: 36px;
      border: 0;
      border-radius: 0;
      padding: 0;
      background: #fff;
      font-size: 17px;
    }

    .card-qty-value { text-align: center; font-size: 12px; font-weight: 800; }

    .meta {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .add-btn {
      width: 100%;
      margin-top: 0;
      color: #fff;
      border-color: #29364a;
      background: #29364a;
    }

    .add-btn:hover { background: #1f2a3b; }

    .add-btn.is-added {
      border-color: #2f7058;
      background: #2f7058;
    }

    .add-btn:active { transform: translateY(1px); }

    .list-link.is-pulsing .menu-count { animation: bag-pulse .42s ease-out; }

    @keyframes bag-pulse {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.22); }
    }

    .add-toast {
      position: fixed;
      z-index: 50;
      right: 20px;
      bottom: 20px;
      max-width: min(360px, calc(100vw - 24px));
      display: flex;
      align-items: center;
      gap: 9px;
      border: 1px solid #cfe2d9;
      border-radius: 8px;
      padding: 11px 14px;
      background: #fff;
      color: #24372f;
      box-shadow: 0 8px 24px rgba(25, 40, 34, .14);
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .add-toast::before {
      content: "✓";
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e7f4ed;
      color: #246149;
      font-size: 12px;
      font-weight: 900;
    }

    .add-toast.show { opacity: 1; transform: translateY(0); }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: #f4f7fa;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.price {
      color: #29364a;
      background: #f8fafc;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .status-confirmed { color: #176448; background: #edf8f3; border-color: #c5e7d8; }
    .status-legacy { color: #285d6a; background: #eef7f8; border-color: #c9e2e6; }
    .status-likely { color: #315d82; background: #eef5fa; border-color: #cddfea; }
    .status-probable { color: #795b18; background: #fbf6e8; border-color: #eadba8; }
    .status-possible { color: #83502f; background: #fbf1ea; border-color: #e8cfbd; }
    .status-review { color: #8c3f3f; background: #fbefef; border-color: #e8c7c7; }
    .status-original { color: #4d5967; background: #f2f5f7; border-color: #d8dfe5; }
    .status-unknown { color: #59616b; background: #f3f4f5; border-color: #d9dcdf; }
    .status-new { color: #8a365f; background: #fbf0f5; border-color: #e8c6d7; }

    .card.is-new {
      border-style: dashed;
      border-color: #d9a9c0;
      background: #fffafd;
    }

    .code-pair {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .card-details {
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .card-details summary {
      cursor: pointer;
      padding: 0 1px;
      color: #687588;
      font-size: 11px;
      font-weight: 700;
      list-style-position: outside;
    }

    .card-details[open] summary { margin-bottom: 9px; }

    .technical-details {
      display: grid;
      grid-template-columns: minmax(76px, auto) minmax(0, 1fr);
      gap: 6px 10px;
      margin: 0;
    }

    .technical-details dt {
      color: var(--muted);
      font-weight: 700;
    }

    .technical-details dd {
      margin: 0;
      color: var(--ink);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .detail-reasoning,
    .pyramid {
      margin-top: 10px;
      border-top: 1px solid #edf1f5;
      padding-top: 9px;
      line-height: 1.45;
    }

    .detail-reasoning strong,
    .pyramid h4 {
      display: block;
      margin: 0 0 5px;
      color: #425064;
      font-size: 11px;
      text-transform: uppercase;
    }

    .pyramid p { margin: 5px 0 0; }

    .detail-link {
      color: #315d82;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .note-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #b653d9;
      display: inline-block;
    }

    }

    function primaryStatus(item) {
      if (item.match_confidence === 'Confirmed') return { label: 'Confirmed', className: 'status-confirmed' };
      if (item.match_confidence === 'Very likely') return { label: 'Very likely', className: 'status-likely' };
      if (item.match_confidence === 'Probable' || item.match_confidence === 'Possible') return { label: 'Probable / Possible', className: 'status-probable' };
      if (item.match_confidence === 'Original / no dupe') return { label: 'Original', className: 'status-original' };
      return { label: 'Unknown', className: 'status-unknown' };
    }

    function viewItems() {
      return catalogueItems.filter(item => currentView === 'body' ? item.group === 'Body Care' : item.group !== 'Body Care');
    }

    function fillSelect(select, options, selectedValue) {
      select.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join('');
      select.value = selectedValue;
    }

    function updateFilterOptions() {
      const items = viewItems();
      const categories = ['all', ...new Set(items.map(item => item.group))];
      const brands = ['all', ...new Set(items.map(item => item.brand).filter(Boolean).sort((a, b) => a.localeCompare(b)))];
      const statuses = ['all', ...statusLabels.filter(value => items.some(item => normalizedConfidence(item) === value))];

      if (!categories.includes(categoryFilter.value)) categoryFilter.value = 'all';
      if (!brands.includes(brandFilter.value)) brandFilter.value = 'all';
      if (!statuses.includes(statusFilter.value)) statusFilter.value = 'all';
      if (!sortLabels.includes(sortFilter.value || 'Recommended')) sortFilter.value = 'Recommended';

      fillSelect(
        categoryFilter,
        categories.map(value => ({ value, label: categoryLabels[value] || value })),
        categoryFilter.value || 'all'
      );

      fillSelect(
        brandFilter,
        brands.map(value => ({ value, label: value === 'all' ? 'All brands' : value })),
        brandFilter.value || 'all'
      );

      fillSelect(
        statusFilter,
        statuses.map(value => ({ value, label: value === 'all' ? 'All matches' : value })),
        statusFilter.value || 'all'
      );

      fillSelect(
        sortFilter,
        sortLabels.map(value => ({ value, label: value })),
        sortFilter.value || 'Recommended'
      );

      fillSelect(
        mobileBrandFilter,
        brands.map(value => ({ value, label: value === 'all' ? 'All brands' : value })),
        brandFilter.value || 'all'
      );

      fillSelect(
        mobileStatusFilter,
        statuses.map(value => ({ value, label: value === 'all' ? 'All matches' : value })),
        statusFilter.value || 'all'
      );

      fillSelect(
        mobileSortFilter,
        sortLabels.map(value => ({ value, label: value })),
        sortFilter.value || 'Recommended'
      );

    }

    function syncFilterUi(filteredCount) {
      const items = viewItems();
      const category = categoryFilter.value || 'all';
      const status = statusFilter.value || 'all';
      const brand = brandFilter.value || 'all';
      const queryValue = search.value.trim();

      categoryChipButtons.forEach(button => {
        const value = button.dataset.category;
        const available = value === 'all' || items.some(item => item.group === value);
        button.disabled = !available;
        button.classList.toggle('active', value === category);
        button.setAttribute('aria-pressed', String(value === category));
      });

      const active = [];
      if (queryValue) active.push(`“${queryValue}”`);
      if (category !== 'all') active.push(categoryLabels[category] || category);
      if (status !== 'all') active.push(status);
      if (brand !== 'all') active.push(brand);
      if ((sortFilter.value || 'Recommended') !== 'Recommended') active.push(sortFilter.value);

      clearCatalogueFilters.hidden = active.length === 0;

      let summary = '';
      if (queryValue) {
        summary = `Showing ${filteredCount} result${filteredCount === 1 ? '' : 's'} for "${queryValue}"`;
      } else if (currentView === 'body') {
        summary = `${filteredCount} body care item${filteredCount === 1 ? '' : 's'}`;
      } else if (category !== 'all') {
        const audience = category === 'Kids' ? 'kids' : `${category.toLowerCase()}'s`;
        summary = `${filteredCount} ${audience} perfume${filteredCount === 1 ? '' : 's'}`;
      } else {
        summary = `${filteredCount} perfume item${filteredCount === 1 ? '' : 's'}`;
      }

      const secondary = [];
      if (!queryValue && category !== 'all') secondary.push(categoryLabels[category] || category);
      if (brand !== 'all') secondary.push(`Brand: ${brand}`);
      if (status !== 'all') secondary.push(`Match: ${status}`);
      if ((sortFilter.value || 'Recommended') !== 'Recommended') secondary.push(`Sort: ${sortFilter.value}`);

      filterSummary.hidden = false;
      filterSummary.textContent = secondary.length ? `${summary} · ${secondary.join(' · ')}` : summary;
    }

    function normalize(value) {
      return value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function priceValue(price) {
      const cleaned = price.replace(/[^\d,.]/g, '').replace(',', '.');
      return Number.parseFloat(cleaned) || 0;
    }

    function formatEuro(value) {
      return value.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
    }

    function minimumOptionPrice(item) {
      return Math.min(...item.options.map(option => priceValue(option.price)));
    }

    function compactChoganName(name) {
      const cleaned = (name || '')
        .replace(/\s*-\s*(?:Unisex\s+)?(?:Luxury\s+)?Perfume.*$/i, '')
        .replace(/^Perfume.*$/i, '')
        .trim();
      return cleaned || 'Fragrance';
    }

    function addSelectionItem(item, option, quantity = 1) {
      const key = `${item.no}|${option.size}|${option.price}`;
      const existing = selectedItems.find(entry => entry.key === key);
      const quantityUpdated = Boolean(existing);

      if (existing) {
        existing.qty += quantity;
      } else {
        selectedItems.push({
          key,
          no: item.no,
          name: item.name,
          brand: item.brand,
          group: item.group,
          type: item.type,
          size: option.size,
          price: option.price,
          qty: quantity
        });
      }

      renderSelection();
      return quantityUpdated;
    }

    function pulseBagCount() {
      bagButton.classList.remove('is-pulsing');
      void bagButton.offsetWidth;
      bagButton.classList.add('is-pulsing');
      window.setTimeout(() => bagButton.classList.remove('is-pulsing'), 450);
    }

    function showAddToast(message) {
      window.clearTimeout(toastTimer);
      addToast.textContent = message;
      addToast.classList.add('show');
      toastTimer = window.setTimeout(() => addToast.classList.remove('show'), 2600);
    }

    function showButtonFeedback(button) {
      window.clearTimeout(buttonFeedbackTimers.get(button));
      button.textContent = 'Added ✓';
      button.classList.add('is-added');
      button.disabled = true;
      const timer = window.setTimeout(() => {
        button.textContent = 'Add to list';
        button.classList.remove('is-added');
        button.disabled = false;
        buttonFeedbackTimers.delete(button);
      }, 1500);
      buttonFeedbackTimers.set(button, timer);
    }

    function addCardSelection(card, button) {
      const item = catalogueItems.find(entry => entry.no === card.dataset.no);
      if (!item) return;
      const selectedChip = card.querySelector('.format-chip.selected');
      const option = item.options[Number(selectedChip?.dataset.optionIndex || 0)] || item.options[0];
      const quantity = Number(card.querySelector('.card-qty-value')?.textContent || 1);
      const quantityUpdated = addSelectionItem(item, option, quantity);
      showButtonFeedback(button);
      pulseBagCount();
      showAddToast(quantityUpdated
        ? 'Quantity updated in My List'
        : `Added ${quantity > 1 ? `${quantity} × ` : ''}${option.size} ${item.name} to My List`);
    }

    function changeQuantity(key, amount) {
      const item = selectedItems.find(entry => entry.key === key);
      if (!item) return;
      item.qty += amount;
      if (item.qty <= 0) selectedItems = selectedItems.filter(entry => entry.key !== key);
      renderSelection();
    }

    function removeSelection(key) {
      selectedItems = selectedItems.filter(entry => entry.key !== key);
      renderSelection();
    }

    function selectionText() {
      if (!selectedItems.length) return 'My Chogan list is empty.';
      const lines = selectedItems.map(item => {
        const label = item.group === 'Body Care' ? item.name : `${item.name} inspired by ${item.brand}`;
        return `${item.qty} x ${item.no} ${label} - ${item.size} - ${item.price}`;
      });
      const total = selectedItems.reduce((sum, item) => sum + priceValue(item.price) * item.qty, 0);
      return `${lines.join('\n')}\nTotal: ${formatEuro(total)}`;
    }

    function renderSelection() {
      const count = selectedItems.reduce((sum, item) => sum + item.qty, 0);
      const total = selectedItems.reduce((sum, item) => sum + priceValue(item.price) * item.qty, 0);

      selectionCount.textContent = count;
      bagMenuCount.textContent = count;
      if (currentPage === 'bag') totalCount.textContent = count;
      selectionTotal.textContent = formatEuro(total);
      clearSelection.disabled = !selectedItems.length;
      copySelection.disabled = !selectedItems.length;

      if (!selectedItems.length) {
        selectionList.innerHTML = '<p class="selection-empty">Add products here to build a quick list.</p>';
        return;
      }

      selectionList.innerHTML = selectedItems.map(item => `
        <div class="selection-item" data-selection-key="${item.key}">
          <div class="selection-top">
            <div>
              <p class="selection-name">${item.no} ${item.name}</p>
              <p class="selection-sub">${item.group === 'Body Care' ? item.type : `Inspired by ${item.brand}`} - ${item.size}</p>
              <p class="selection-sub">Unit price: ${item.price}</p>
            </div>
            <div class="selection-price"><span>Line total</span><strong>${formatEuro(priceValue(item.price) * item.qty)}</strong></div>
          </div>
          <div class="qty-row">
            <button class="qty-btn" type="button" data-qty-change="-1" aria-label="Decrease quantity">-</button>
            <span class="qty-value">${item.qty}</span>
            <button class="qty-btn" type="button" data-qty-change="1" aria-label="Increase quantity">+</button>
            <button class="remove-btn" type="button" data-remove-item>Remove</button>
          </div>
        </div>
      `).join('');
    }

    function setPage(page) {
      currentPage = page;
      const mobileBag = page === 'bag' && window.matchMedia('(max-width: 640px)').matches;
      browsePage.hidden = mobileBag ? false : page !== 'perfumes' && page !== 'body';
      bagPage.hidden = page !== 'bag';
      filters.hidden = page !== 'perfumes' && page !== 'body';
      categoryChips.hidden = page !== 'perfumes';
      document.body.classList.toggle('bag-open', mobileBag);

      menuButtons.forEach(button => button.classList.toggle('active', button.dataset.page === page));

      if (page === 'perfumes' || page === 'body') {
        currentView = page;
        categoryFilter.value = 'all';
        brandFilter.value = 'all';
        statusFilter.value = 'all';
        sortFilter.value = 'Recommended';
        updateFilterOptions();
        render();
      } else {
        totalCount.textContent = page === 'bag' ? selectedItems.reduce((sum, item) => sum + item.qty, 0) : catalogueItems.length;
      }
    }

    function closeBagSheet() {
      currentPage = currentView;
      bagPage.hidden = true;
      browsePage.hidden = false;
      filters.hidden = false;
      categoryChips.hidden = currentView !== 'perfumes';
      document.body.classList.remove('bag-open');
      menuButtons.forEach(button => button.classList.toggle('active', button.dataset.page === currentView));
    }

    function render() {
      const query = normalize(search.value.trim());
      const category = categoryFilter.value || 'all';
      const brand = brandFilter.value || 'all';
      const status = statusFilter.value || 'all';
      const sortValue = sortFilter.value || 'Recommended';
      const filtered = viewItems().filter(item => {
        const haystack = normalize([item.no, item.legacy_code, item.current_code, item.chogan_name, item.name, item.brand, item.group, item.section, item.type, item.tier, item.size, item.price, item.verification_status, item.match_confidence].join(' '));
        const matchesSearch = !query || haystack.includes(query);
        const matchesCategory = category === 'all' || item.group === category;
        const matchesBrand = brand === 'all' || item.brand === brand;
        const matchesStatus = status === 'all' || normalizedConfidence(item) === status;
        return matchesSearch && matchesCategory && matchesBrand && matchesStatus;
      }).sort((a, b) => {
        if (sortValue === 'A-Z') return a.name.localeCompare(b.name);
        if (sortValue === 'Brand') return (a.brand || '').localeCompare(b.brand || '') || a.name.localeCompare(b.name);
        if (sortValue === 'Price low to high') return minimumOptionPrice(a) - minimumOptionPrice(b);
        if (sortValue === 'Price high to low') return minimumOptionPrice(b) - minimumOptionPrice(a);
        if (sortValue === 'Match quality') {
          const order = { 'Confirmed': 0, 'Very likely': 1, 'Probable / Possible': 2, 'Original': 3, 'Unknown': 4 };
          return (order[normalizedConfidence(a)] ?? 9) - (order[normalizedConfidence(b)] ?? 9);
        }
        return 0;
      });

      const tierOrder = ['Standard', 'Premium', 'Luxury', 'New'];
      const sectionOrder = currentView === 'body' ? ['Body Care'] : ['Women', 'Men', 'Unisex', 'Kids'];
      catalogue.innerHTML = sectionOrder.map(section => {
        const sectionItems = filtered.filter(item => item.group === section);
        if (!sectionItems.length) return '';
        const sectionClass = section === 'Women' ? 'femme' : section === 'Men' ? 'homme' : section === 'Unisex' ? 'mixte' : section === 'Body Care' ? 'body' : 'luxe';
        const renderCards = items => `
            <div class="grid">
              ${items.map(item => {
                const primary = primaryStatus(item);
                const referenceName = item.match_confidence === 'Original / no dupe' ? 'Original Chogan creation' : item.match_confidence === 'Unknown' ? 'Reference unknown' : item.name;
                const referenceBrand = item.match_confidence === 'Original / no dupe' || item.match_confidence === 'Unknown' ? 'Chogan' : (item.brand || 'Chogan');
                return `
                <article class="card ${item.category === 'New' ? 'is-new' : ''}" style="--accent:${item.accent}" data-no="${item.no}">
                  <div class="product-photo" aria-hidden="true">
                    <span class="num photo-code">${item.current_code || item.legacy_code || item.no}</span>
                    ${item.image ? `<img class="reference-img" src="${item.image}" alt="${item.brand} ${item.name} reference image" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className: 'bottle'}))">` : `<div class="bottle"></div>`}
                  </div>
                  <div class="product">
                    <div class="product-head">
                      <p class="name">${referenceName}</p>
                    </div>
                    <p class="maker">${referenceBrand}</p>
                    ${item.chogan_name ? `<p class="chogan-product"><strong>Chogan</strong> · ${compactChoganName(item.chogan_name)}</p>` : ''}
                    <div class="card-status-row">
                      <span class="status-badge ${primary.className}">${primary.label}</span>
                      ${item.category === 'New' ? '<span class="new-layer-label">New / Unverified</span>' : ''}
                    </div>
                    <div class="purchase-row">
                      <div class="format-chips" role="group" aria-label="Choose format for ${referenceName}">
                        ${item.options.map((option, index) => `<button class="format-chip ${index === 0 ? 'selected' : ''}" type="button" data-option-index="${index}" aria-pressed="${index === 0 ? 'true' : 'false'}">${option.size}</button>`).join('')}
                      </div>
                      <span class="price-teaser" data-selected-price>${item.options[0].price}</span>
                      <div class="card-buy-row">
                        <div class="card-qty" aria-label="Quantity">
                          <button class="card-qty-btn" type="button" data-card-qty="-1" aria-label="Decrease quantity">&minus;</button>
                          <span class="card-qty-value">1</span>
                          <button class="card-qty-btn" type="button" data-card-qty="1" aria-label="Increase quantity">+</button>
                        </div>
                        <button class="add-btn" type="button" data-add-item>Add to list</button>
                      </div>
                    </div>
                    <details class="card-details">
                      <summary>Notes &amp; details</summary>
                      <dl class="technical-details">
                        ${item.current_code ? `<dt>Current code</dt><dd>${item.current_code}</dd>` : ''}
                        ${item.legacy_code ? `<dt>Legacy code</dt><dd>${item.legacy_code}</dd>` : ''}
                        ${item.chogan_name ? `<dt>Chogan product</dt><dd>${item.chogan_name}</dd>` : ''}
                        <dt>Verification</dt><dd>${item.verification_status || 'Unknown'}</dd>
                        <dt>Confidence</dt><dd>${item.match_confidence || 'Unknown'}</dd>
                        <dt>Match method</dt><dd>${item.match_method || 'Unknown'}</dd>
                        ${item.product_url ? `<dt>Product page</dt><dd><a class="detail-link" href="${item.product_url}" target="_blank" rel="noreferrer">View Chogan product</a></dd>` : ''}
                      </dl>
                      ${item.match_reasoning ? `<p class="detail-reasoning"><strong>Match reasoning</strong>${item.match_reasoning}</p>` : ''}
                      ${item.head_note || item.heart_note || item.base_note ? `<div class="pyramid"><h4>Olfactory pyramid</h4>${item.head_note ? `<p><strong>Head:</strong> ${item.head_note}</p>` : ''}${item.heart_note ? `<p><strong>Heart:</strong> ${item.heart_note}</p>` : ''}${item.base_note ? `<p><strong>Base:</strong> ${item.base_note}</p>` : ''}</div>` : ''}
                    </details>
                  </div>
                </article>
              `}).join('')}
            </div>`;

        const selectedAudience = ['Women', 'Men', 'Unisex', 'Kids'].includes(category);
        const subsections = section === 'Body Care' || section === 'Kids'
          ? renderCards(sectionItems)
          : tierOrder.map(tier => {
              const tierItems = sectionItems.filter(item => item.tier === tier);
              if (!tierItems.length) return '';
              if (selectedAudience && category !== section) return '';
              return `
                <div class="subsection">
                  <div class="subsection-head">
                    <h3>${tier}</h3>
                    <span>${tierItems.length} item${tierItems.length === 1 ? '' : 's'}</span>
                  </div>
                  ${renderCards(tierItems)}
                </div>
              `;
            }).join('');

        return `
          <section>
            <div class="section-title ${sectionClass}">
              <h2>${section}</h2>
              <span>${sectionItems.length} reference${sectionItems.length > 1 ? 's' : ''}</span>
            </div>
            ${subsections}
          </section>
        `;
      }).join('');

      empty.style.display = filtered.length ? 'none' : 'block';
      totalCount.textContent = filtered.length;
      syncFilterUi(filtered.length);
    }

    search.addEventListener('input', render);
    categoryChips.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (!button || button.disabled) return;
      categoryFilter.value = button.dataset.category;
      render();
    });
    brandFilter.addEventListener('change', () => {
      mobileBrandFilter.value = brandFilter.value;
      render();
    });
    mobileBrandFilter.addEventListener('change', () => {
      brandFilter.value = mobileBrandFilter.value;
      render();
    });
    statusFilter.addEventListener('change', () => {
      mobileStatusFilter.value = statusFilter.value;
      render();
    });
    mobileStatusFilter.addEventListener('change', () => {
      statusFilter.value = mobileStatusFilter.value;
      render();
    });
    sortFilter.addEventListener('change', () => {
      mobileSortFilter.value = sortFilter.value;
      render();
    });
    mobileSortFilter.addEventListener('change', () => {
      sortFilter.value = mobileSortFilter.value;
      render();
    });
    clearCatalogueFilters.addEventListener('click', () => {
      search.value = '';
      categoryFilter.value = 'all';
      brandFilter.value = 'all';
      statusFilter.value = 'all';
      sortFilter.value = 'Recommended';
      mobileBrandFilter.value = 'all';
      mobileStatusFilter.value = 'all';
      mobileSortFilter.value = 'Recommended';
      render();
    });
    mobileClearCatalogueFilters.addEventListener('click', () => clearCatalogueFilters.click());
    mobileFiltersButton.addEventListener('click', () => {
      const open = !mobileFiltersPanel.classList.contains('open');
      mobileFiltersPanel.classList.toggle('open', open);
      mobileSortPanel.classList.remove('open');
      mobileFiltersButton.setAttribute('aria-expanded', String(open));
      mobileSortButton.setAttribute('aria-expanded', 'false');
    });
    mobileSortButton.addEventListener('click', () => {
      const open = !mobileSortPanel.classList.contains('open');
      mobileSortPanel.classList.toggle('open', open);
      mobileFiltersPanel.classList.remove('open');
      mobileSortButton.setAttribute('aria-expanded', String(open));
      mobileFiltersButton.setAttribute('aria-expanded', 'false');
    });
    catalogue.addEventListener('click', event => {
      const card = event.target.closest('.card');
      if (!card) return;

      const formatChip = event.target.closest('.format-chip');
      if (formatChip) {
        const item = catalogueItems.find(entry => entry.no === card.dataset.no);
        const option = item?.options[Number(formatChip.dataset.optionIndex)];
        if (!option) return;
        card.querySelectorAll('.format-chip').forEach(chip => {
          const selected = chip === formatChip;
          chip.classList.toggle('selected', selected);
          chip.setAttribute('aria-pressed', String(selected));
        });
        card.querySelector('[data-selected-price]').textContent = option.price;
        return;
      }

      const quantityButton = event.target.closest('[data-card-qty]');
      if (quantityButton) {
        const quantityValue = card.querySelector('.card-qty-value');
        quantityValue.textContent = Math.max(1, Number(quantityValue.textContent) + Number(quantityButton.dataset.cardQty));
        return;
      }

      const addButton = event.target.closest('[data-add-item]');
      if (addButton) addCardSelection(card, addButton);
    });
    selectionList.addEventListener('click', event => {
      const item = event.target.closest('[data-selection-key]');
      if (!item) return;
      const key = item.dataset.selectionKey;
      const qtyButton = event.target.closest('[data-qty-change]');
      if (qtyButton) changeQuantity(key, Number(qtyButton.dataset.qtyChange));
      if (event.target.closest('[data-remove-item]')) removeSelection(key);
    });
    closeBag.addEventListener('click', closeBagSheet);
    bagPage.addEventListener('click', event => {
      if (event.target === bagPage && window.matchMedia('(max-width: 640px)').matches) closeBagSheet();
    });
    clearSelection.addEventListener('click', () => {
      selectedItems = [];
      renderSelection();
    });
    function fallbackCopy(text) {
      const area = document.createElement('textarea');
      area.value = text;
      area.setAttribute('readonly', '');
      area.style.position = 'fixed';
      area.style.left = '-9999px';
      document.body.appendChild(area);
      area.select();
      const copied = document.execCommand('copy');
      area.remove();
      if (!copied) window.prompt('Copy your list:', text);
    }

    copySelection.addEventListener('click', async () => {
      const text = selectionText();
      try {
        if (!navigator.clipboard) throw new Error('Clipboard unavailable');
        await navigator.clipboard.writeText(text);
        copySelection.textContent = 'Copied';
        setTimeout(() => { copySelection.textContent = 'Copy list'; }, 1200);
      } catch (error) {
        fallbackCopy(text);
        copySelection.textContent = 'Copied';
        setTimeout(() => { copySelection.textContent = 'Copy list'; }, 1200);
      }
    });
    menuButtons.forEach(button => {
      button.addEventListener('click', () => {
        setPage(button.dataset.page);
      });
    });
    updateFilterOptions();
    renderSelection();
    render();
    setPage('perfumes');
  </script>
</body>
</html>
