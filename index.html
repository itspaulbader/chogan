<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chogan Perfume Catalogue</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #657282;
      --line: #dde4ec;
      --paper: #fbfcfd;
      --white: #ffffff;
      --pink: #d12f8a;
      --blue: #1877a6;
      --green: #208261;
      --gold: #a66b15;
      --red: #b64242;
      --shadow: 0 10px 28px rgba(24, 38, 55, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.35;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 18px 48px;
    }

    header {
      margin-bottom: 12px;
    }

    .intro, .tools, .notice {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 16px 18px;
      display: grid;
      gap: 8px;
    }

    .brandline {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      color: var(--muted);
      font-size: 13px;
      background: #f7f9fb;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 74ch;
      font-size: 16px;
    }

    .catalogue-shell {
      display: block;
    }

    .top-menu {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      min-width: 0;
    }

    .menu-btn {
      min-height: 42px;
      white-space: nowrap;
    }

    .menu-btn .menu-count {
      display: inline-grid;
      min-width: 22px;
      height: 22px;
      margin-left: 6px;
      place-items: center;
      border-radius: 999px;
      background: #edf2f7;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    .menu-btn.active .menu-count {
      background: rgba(255,255,255,.22);
      color: #fff;
    }

    .page-view[hidden] {
      display: none;
    }

    .selection-panel {
      max-width: 760px;
      display: grid;
      gap: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .bag-page .selection-panel {
      margin-top: 18px;
    }

    .selection-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .selection-head h2 {
      margin: 0;
      font-size: 18px;
      text-transform: uppercase;
    }

    .selection-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-count {
      min-width: 34px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #29364a;
      font-weight: 900;
    }

    .selection-list {
      display: grid;
      gap: 10px;
      padding-right: 2px;
    }

    .selection-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .selection-item {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
    }

    .selection-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .selection-name {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .selection-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-price {
      text-align: right;
      font-size: 12px;
      font-weight: 900;
    }

    .qty-row, .selection-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qty-btn {
      width: 32px;
      min-height: 32px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .qty-value {
      min-width: 26px;
      text-align: center;
      font-weight: 900;
    }

    .remove-btn {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }

    .selection-total {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      font-weight: 900;
    }

    .selection-actions button {
      flex: 1 1 auto;
    }

    .tools {
      margin: 14px 0 18px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .store-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }

    .filter-row {
      display: grid;
      gap: 9px;
    }

    .filter-primary {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .store-tabs {
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }

    .view-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .result-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .search-field label { display: none; }

    .search, .filter-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 11px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
    }

    .brand-filter {
      position: relative;
    }

    .brand-filter summary {
      min-width: 112px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 34px 0 12px;
      display: flex;
      align-items: center;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      list-style: none;
      position: relative;
    }

    .brand-filter summary::-webkit-details-marker { display: none; }
    .brand-filter summary::after {
      content: "";
      width: 7px;
      height: 7px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg);
      position: absolute;
      right: 13px;
      top: 13px;
    }

    .brand-filter[open] summary::after { transform: rotate(225deg); top: 17px; }

    .brand-filter .filter-select {
      position: absolute;
      right: 0;
      top: calc(100% + 5px);
      z-index: 6;
      width: 230px;
      box-shadow: 0 10px 24px rgba(39, 52, 70, .12);
    }

    .clear-filters {
      min-height: 38px;
      border-color: transparent;
      padding-inline: 8px;
      color: #536174;
      background: transparent;
      font-size: 12px;
    }

    .clear-filters[hidden] { display: none; }

    .filter-chip-groups {
      display: grid;
      gap: 6px;
    }

    .filter-chip-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .filter-chip-row + .filter-chip-row {
      border-top: 1px solid #edf1f5;
      padding-top: 6px;
    }

    .filter-chip {
      min-height: 32px;
      border-radius: 999px;
      padding: 0 11px;
      color: #4f5d70;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .filter-chip:hover { border-color: #aeb9c6; }
    .filter-chip.active {
      border-color: #29364a;
      color: #fff;
      background: #29364a;
    }

    .filter-chip:disabled {
      display: none;
    }

    .filter-summary {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .filter-summary[hidden] { display: none; }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    button.active {
      color: #fff;
      border-color: #29364a;
      background: #29364a;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 18px;
    }

    .summary div {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .summary strong {
      display: block;
      font-size: 24px;
    }

    .summary span {
      color: var(--muted);
      font-size: 13px;
    }

    section { margin-top: 28px; }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      border-left: 5px solid var(--section-color, #d9e1ea);
      background: var(--section-bg, transparent);
      border-radius: 8px 8px 0 0;
      margin-bottom: 12px;
      padding: 10px 12px;
      color: var(--ink);
    }

    .section-title h2 {
      margin: 0;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .section-title span { color: var(--muted); font-size: 14px; }
    .femme { --section-color: #c85a95; --section-bg: #fff7fb; }
    .homme { --section-color: #3f83a8; --section-bg: #f5fbff; }
    .mixte { --section-color: #4f9a7d; --section-bg: #f5fcf8; }
    .luxe { --section-color: #b58a3b; --section-bg: #fffaf0; }
    .luxury { --section-color: #a85a5a; --section-bg: #fff7f7; }
    .body { --section-color: #6b7885; --section-bg: #f7f9fb; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 248px;
      display: grid;
      gap: 9px;
      align-content: start;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: #d9e1ea;
    }

    .product-photo {
      min-height: 132px;
      border: 1px solid #edf1f5;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 84%, rgba(44, 54, 68, .16), transparent 24%),
        #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .reference-img {
      width: 100%;
      height: 132px;
      object-fit: contain;
      padding: 10px;
      background: #fff;
      display: block;
    }

    .bottle {
      width: 56px;
      height: 94px;
      position: relative;
      border-radius: 10px 10px 16px 16px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.38), transparent 25% 70%, rgba(0,0,0,.08)),
        linear-gradient(180deg, #eef2f6, #6d7886);
      box-shadow: 0 16px 24px rgba(30, 43, 60, .18);
    }

    .bottle::before {
      content: "";
      position: absolute;
      left: 18px;
      top: -19px;
      width: 20px;
      height: 22px;
      border-radius: 4px 4px 2px 2px;
      background: #f7f9fb;
      border: 1px solid rgba(31, 41, 51, .12);
    }

    .bottle::after {
      content: "Z";
      position: absolute;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: 34px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      background: rgba(255,255,255,.82);
      color: #29364a;
      font-weight: 900;
      font-size: 17px;
    }

    .num {
      min-width: 44px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #29364a;
      font-weight: 900;
      font-size: 13px;
    }

    .product { min-width: 0; }

    .product-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .name {
      margin: 0 0 3px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .maker {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .maker strong {
      display: block;
      color: #364454;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0;
    }

    .chogan-product {
      margin: 7px 0 0;
      color: #425064;
      font-size: 12px;
      line-height: 1.35;
    }

    .chogan-product strong {
      color: var(--muted);
      font-weight: 700;
    }

    .card-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 9px;
    }

    .new-layer-label {
      color: #8a365f;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .purchase-row {
      margin-top: 10px;
    }

    .meta {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .add-btn {
      width: 100%;
      margin-top: 10px;
      color: #fff;
      border-color: #29364a;
      background: #29364a;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: #f4f7fa;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill.price {
      color: #29364a;
      background: #f8fafc;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .status-confirmed { color: #176448; background: #edf8f3; border-color: #c5e7d8; }
    .status-legacy { color: #285d6a; background: #eef7f8; border-color: #c9e2e6; }
    .status-likely { color: #315d82; background: #eef5fa; border-color: #cddfea; }
    .status-probable { color: #795b18; background: #fbf6e8; border-color: #eadba8; }
    .status-possible { color: #83502f; background: #fbf1ea; border-color: #e8cfbd; }
    .status-review { color: #8c3f3f; background: #fbefef; border-color: #e8c7c7; }
    .status-original { color: #4d5967; background: #f2f5f7; border-color: #d8dfe5; }
    .status-unknown { color: #59616b; background: #f3f4f5; border-color: #d9dcdf; }
    .status-new { color: #8a365f; background: #fbf0f5; border-color: #e8c6d7; }

    .card.is-new {
      border-style: dashed;
      border-color: #d9a9c0;
      background: #fffafd;
    }

    .code-pair {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .card-details {
      margin-top: 9px;
      border-top: 1px solid #e7ecf1;
      color: var(--muted);
      font-size: 11px;
    }

    .card-details summary {
      cursor: pointer;
      padding: 9px 1px 0;
      color: #425064;
      font-size: 12px;
      font-weight: 800;
      list-style-position: outside;
    }

    .card-details[open] summary { margin-bottom: 9px; }

    .technical-details {
      display: grid;
      grid-template-columns: minmax(76px, auto) minmax(0, 1fr);
      gap: 6px 10px;
      margin: 0;
    }

    .technical-details dt {
      color: var(--muted);
      font-weight: 700;
    }

    .technical-details dd {
      margin: 0;
      color: var(--ink);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .detail-reasoning,
    .pyramid {
      margin-top: 10px;
      border-top: 1px solid #edf1f5;
      padding-top: 9px;
      line-height: 1.45;
    }

    .detail-reasoning strong,
    .pyramid h4 {
      display: block;
      margin: 0 0 5px;
      color: #425064;
      font-size: 11px;
      text-transform: uppercase;
    }

    .pyramid p { margin: 5px 0 0; }

    .detail-link {
      color: #315d82;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .option-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 9px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }

    .note-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #b653d9;
      display: inline-block;
    }

    .notice {
      margin-top: 26px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      display: none;
      padding: 28px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .filter-row { justify-content: flex-start; }
      .tools { top: 0; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .page { padding: 16px 10px 34px; }
      .intro { padding: 16px; }
      h1 { font-size: 28px; }
      .lead { font-size: 14px; }
      .tools {
        position: sticky;
        top: 0;
        margin: 12px -10px 16px;
        padding: 10px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }
      .store-tabs {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        padding-bottom: 8px;
      }
      .top-menu {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .top-menu::-webkit-scrollbar { display: none; }
      .menu-btn {
        flex: 0 0 auto;
        min-height: 38px;
        padding: 0 11px;
        font-size: 13px;
      }
      .menu-btn .menu-count {
        min-width: 19px;
        height: 19px;
        margin-left: 4px;
      }
      .result-count {
        align-self: center;
        font-size: 12px;
      }
      .filter-row {
        gap: 8px;
      }
      .filter-primary {
        grid-template-columns: minmax(0, 1fr) auto;
      }
      .search-field {
        grid-column: 1 / -1;
      }
      .brand-filter {
        grid-column: 1;
        justify-self: start;
      }
      .clear-filters {
        grid-column: 2;
        grid-row: 2;
        justify-self: end;
        min-height: 24px;
        padding: 0;
      }
      .brand-filter summary {
        min-width: 106px;
      }
      .search, .filter-select {
        min-height: 38px;
        padding: 0 10px;
        font-size: 14px;
      }
      .brand-filter .filter-select {
        position: fixed;
        left: 10px;
        right: 10px;
        top: auto;
        width: calc(100% - 20px);
      }
      .filter-chip-row {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .filter-chip-row::-webkit-scrollbar { display: none; }
      .filter-chip { flex: 0 0 auto; min-height: 32px; }
      .summary, .price-list { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { min-height: 232px; }
      .product-photo { min-height: 112px; }
      .reference-img { height: 112px; }
      .section-title { align-items: start; flex-direction: column; }
      .tools { position: static; }
      button { flex: 1 1 auto; }
    }

    @media print {
      body { background: #fff; }
      .page { max-width: none; padding: 0; }
      .tools { display: none; }
      .selection-panel { break-inside: avoid; }
      .add-btn, .selection-actions, .qty-row button, .remove-btn { display: none; }
      header, .intro, .notice, .summary div, .card {
        box-shadow: none;
      }
      header { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    function primaryStatus(item) {
      if (item.match_confidence === 'Confirmed') return { label: 'Confirmed', className: 'status-confirmed' };
      if (item.match_confidence === 'Very likely') return { label: 'Very likely', className: 'status-likely' };
      if (item.match_confidence === 'Probable') return { label: 'Probable', className: 'status-probable' };
      if (item.match_confidence === 'Possible') return { label: 'Possible', className: 'status-possible' };
      if (item.match_confidence === 'Original / no dupe') return { label: 'Original', className: 'status-original' };
      return { label: 'Unknown', className: 'status-unknown' };
    }

    function viewItems() {
      return catalogueItems.filter(item => currentView === 'body' ? item.group === 'Body Care' : item.group !== 'Body Care');
    }

    function fillSelect(select, options, selectedValue) {
      select.innerHTML = options.map(option => `<option value="${option.value}">${option.label}</option>`).join('');
      select.value = selectedValue;
    }

    function updateFilterOptions() {
      const items = viewItems();
      const categories = ['all', ...new Set(items.map(item => item.group))];
      const brands = ['all', ...new Set(items.map(item => item.brand).filter(Boolean).sort((a, b) => a.localeCompare(b)))];
      const statuses = ['all', ...statusLabels.filter(value => items.some(item => item.match_confidence === value))];

      if (!categories.includes(categoryFilter.value)) categoryFilter.value = 'all';
      if (!brands.includes(brandFilter.value)) brandFilter.value = 'all';
      if (!statuses.includes(statusFilter.value)) statusFilter.value = 'all';

      fillSelect(
        categoryFilter,
        categories.map(value => ({ value, label: categoryLabels[value] || value })),
        categoryFilter.value || 'all'
      );

      fillSelect(
        brandFilter,
        brands.map(value => ({ value, label: value === 'all' ? 'All brands' : value })),
        brandFilter.value || 'all'
      );

      fillSelect(
        statusFilter,
        statuses.map(value => ({ value, label: value === 'all' ? 'All confidence' : value === 'Original / no dupe' ? 'Original' : value })),
        statusFilter.value || 'all'
      );

    }

    function syncFilterUi(filteredCount) {
      const items = viewItems();
      const category = categoryFilter.value || 'all';
      const status = statusFilter.value || 'all';
      const brand = brandFilter.value || 'all';

      categoryChipButtons.forEach(button => {
        const value = button.dataset.category;
        const available = value === 'all' || items.some(item => item.group === value);
        button.disabled = !available;
        button.classList.toggle('active', value === category);
        button.setAttribute('aria-pressed', String(value === category));
      });

      confidenceChipButtons.forEach(button => {
        const value = button.dataset.confidence;
        const available = value === 'all' || items.some(item => item.match_confidence === value);
        button.disabled = !available;
        button.classList.toggle('active', value === status);
        button.setAttribute('aria-pressed', String(value === status));
      });

      brandFilterLabel.textContent = brand === 'all' ? 'Brand' : brand;

      const active = [];
      if (search.value.trim()) active.push(`“${search.value.trim()}”`);
      if (category !== 'all') active.push(categoryLabels[category] || category);
      if (status !== 'all') active.push(status === 'Original / no dupe' ? 'Original' : status);
      if (brand !== 'all') active.push(brand);

      clearCatalogueFilters.hidden = active.length === 0;
      filterSummary.hidden = active.length === 0;
      filterSummary.textContent = active.length
        ? `Showing ${filteredCount} item${filteredCount === 1 ? '' : 's'} · ${active.join(' · ')}`
        : '';
    }

    function normalize(value) {
      return value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function priceValue(price) {
      const cleaned = price.replace(/[^\d,.]/g, '').replace(',', '.');
      return Number.parseFloat(cleaned) || 0;
    }

    function formatEuro(value) {
      return value.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
    }

    function addToSelection(card) {
      const item = catalogueItems.find(entry => entry.no === card.dataset.no);
      const select = card.querySelector('.option-select');
      const option = item.options[select.selectedIndex] || item.options[0];
      const key = `${item.no}|${option.size}|${option.price}`;
      const existing = selectedItems.find(entry => entry.key === key);

      if (existing) {
        existing.qty += 1;
      } else {
        selectedItems.push({
          key,
          no: item.no,
          name: item.name,
          brand: item.brand,
          group: item.group,
          type: item.type,
          size: option.size,
          price: option.price,
          qty: 1
        });
      }

      renderSelection();
    }

    function changeQuantity(key, amount) {
      const item = selectedItems.find(entry => entry.key === key);
      if (!item) return;
      item.qty += amount;
      if (item.qty <= 0) selectedItems = selectedItems.filter(entry => entry.key !== key);
      renderSelection();
    }

    function removeSelection(key) {
      selectedItems = selectedItems.filter(entry => entry.key !== key);
      renderSelection();
    }

    function selectionText() {
      if (!selectedItems.length) return 'My Chogan list is empty.';
      const lines = selectedItems.map(item => {
        const label = item.group === 'Body Care' ? item.name : `${item.name} inspired by ${item.brand}`;
        return `${item.qty} x ${item.no} ${label} - ${item.size} - ${item.price}`;
      });
      const total = selectedItems.reduce((sum, item) => sum + priceValue(item.price) * item.qty, 0);
      return `${lines.join('\n')}\nTotal: ${formatEuro(total)}`;
    }

    function renderSelection() {
      const count = selectedItems.reduce((sum, item) => sum + item.qty, 0);
      const total = selectedItems.reduce((sum, item) => sum + priceValue(item.price) * item.qty, 0);

      selectionCount.textContent = count;
      bagMenuCount.textContent = count;
      if (currentPage === 'bag') totalCount.textContent = count;
      selectionTotal.textContent = formatEuro(total);
      clearSelection.disabled = !selectedItems.length;
      copySelection.disabled = !selectedItems.length;

      if (!selectedItems.length) {
        selectionList.innerHTML = '<p class="selection-empty">Add products here to build a quick list.</p>';
        return;
      }

      selectionList.innerHTML = selectedItems.map(item => `
        <div class="selection-item" data-selection-key="${item.key}">
          <div class="selection-top">
            <div>
              <p class="selection-name">${item.no} ${item.name}</p>
              <p class="selection-sub">${item.group === 'Body Care' ? item.type : `Inspired by ${item.brand}`} - ${item.size}</p>
            </div>
            <div class="selection-price">${formatEuro(priceValue(item.price) * item.qty)}</div>
          </div>
          <div class="qty-row">
            <button class="qty-btn" type="button" data-qty-change="-1" aria-label="Decrease quantity">-</button>
            <span class="qty-value">${item.qty}</span>
            <button class="qty-btn" type="button" data-qty-change="1" aria-label="Increase quantity">+</button>
            <button class="remove-btn" type="button" data-remove-item>Remove</button>
          </div>
        </div>
      `).join('');
    }

    function setPage(page) {
      currentPage = page;
      browsePage.hidden = page !== 'perfumes' && page !== 'body';
      bagPage.hidden = page !== 'bag';
      filters.hidden = page !== 'perfumes' && page !== 'body';

      menuButtons.forEach(button => button.classList.toggle('active', button.dataset.page === page));

      if (page === 'perfumes' || page === 'body') {
        currentView = page;
        categoryFilter.value = 'all';
        brandFilter.value = 'all';
        statusFilter.value = 'all';
        updateFilterOptions();
        render();
      } else {
        totalCount.textContent = page === 'bag' ? selectedItems.reduce((sum, item) => sum + item.qty, 0) : catalogueItems.length;
      }
    }

    function render() {
      const query = normalize(search.value.trim());
      const category = categoryFilter.value || 'all';
      const brand = brandFilter.value || 'all';
      const status = statusFilter.value || 'all';
      const filtered = viewItems().filter(item => {
        const haystack = normalize([item.no, item.legacy_code, item.current_code, item.chogan_name, item.name, item.brand, item.group, item.section, item.type, item.tier, item.size, item.price, item.verification_status, item.match_confidence].join(' '));
        const matchesSearch = !query || haystack.includes(query);
        const matchesCategory = category === 'all' || item.group === category;
        const matchesBrand = brand === 'all' || item.brand === brand;
        const matchesStatus = status === 'all' || item.match_confidence === status;
        return matchesSearch && matchesCategory && matchesBrand && matchesStatus;
      });

      const sections = [...new Set(filtered.map(item => item.section))];
      catalogue.innerHTML = sections.map(section => {
        const items = filtered.filter(item => item.section === section);
        const sectionClass = items[0].group === 'Women' ? 'femme' : items[0].group === 'Men' ? 'homme' : items[0].group === 'Unisex' ? 'mixte' : items[0].group === 'Body Care' ? 'body' : 'luxe';
        return `
          <section>
            <div class="section-title ${sectionClass}">
              <h2>${section}</h2>
              <span>${items.length} reference${items.length > 1 ? 's' : ''}</span>
            </div>
            <div class="grid">
              ${items.map(item => {
                const primary = primaryStatus(item);
                const referenceName = item.match_confidence === 'Original / no dupe' ? 'Original Chogan creation' : item.match_confidence === 'Unknown' ? 'Reference unknown' : item.name;
                const referenceBrand = item.match_confidence === 'Original / no dupe' ? 'Chogan original' : item.match_confidence === 'Unknown' ? 'No verified reference' : (item.brand || 'No verified reference');
                return `
                <article class="card ${item.category === 'New' ? 'is-new' : ''}" style="--accent:${item.accent}" data-no="${item.no}">
                  <div class="product-photo" aria-hidden="true">
                          ${item.image ? `<img class="reference-img" src="${item.image}" alt="${item.brand} ${item.name} reference image" loading="eager" onerror="this.replaceWith(Object.assign(document.createElement('div'), {className: 'bottle'}))">` : `<div class="bottle"></div>`}
                  </div>
                  <div class="product">
                    <div class="product-head">
                      <p class="name">${referenceName}</p>
                      <span class="num">${item.current_code || item.legacy_code || item.no}</span>
                    </div>
                    <p class="maker"><strong>${item.match_confidence === 'Confirmed' ? 'Reference brand' : item.match_confidence === 'Original / no dupe' ? 'Origin' : 'Suggested reference'}</strong>${referenceBrand}</p>
                    ${item.chogan_name ? `<p class="chogan-product"><strong>Chogan</strong> · ${item.chogan_name}</p>` : ''}
                    <div class="card-status-row">
                      <span class="status-badge ${primary.className}">${primary.label}</span>
                      ${item.category === 'New' ? '<span class="new-layer-label">New / Unverified</span>' : ''}
                    </div>
                    <div class="purchase-row">
                      <select class="option-select" aria-label="Choose size and price for ${referenceName}">
                        ${item.options.map(option => `<option data-size="${option.size}" data-price="${option.price}">${[option.size, option.price].filter(Boolean).join(' · ')}</option>`).join('')}
                      </select>
                    </div>
                    <button class="add-btn" type="button" data-add-item>Add to list</button>
                    <details class="card-details">
                      <summary>Notes &amp; details</summary>
                      <dl class="technical-details">
                        ${item.current_code ? `<dt>Current code</dt><dd>${item.current_code}</dd>` : ''}
                        ${item.legacy_code ? `<dt>Legacy code</dt><dd>${item.legacy_code}</dd>` : ''}
                        ${item.chogan_name ? `<dt>Chogan product</dt><dd>${item.chogan_name}</dd>` : ''}
                        <dt>Verification</dt><dd>${item.verification_status || 'Unknown'}</dd>
                        <dt>Confidence</dt><dd>${item.match_confidence || 'Unknown'}</dd>
                        <dt>Match method</dt><dd>${item.match_method || 'Unknown'}</dd>
                        ${item.product_url ? `<dt>Product page</dt><dd><a class="detail-link" href="${item.product_url}" target="_blank" rel="noreferrer">View Chogan product</a></dd>` : ''}
                      </dl>
                      ${item.match_reasoning ? `<p class="detail-reasoning"><strong>Match reasoning</strong>${item.match_reasoning}</p>` : ''}
                      ${item.head_note || item.heart_note || item.base_note ? `<div class="pyramid"><h4>Olfactory pyramid</h4>${item.head_note ? `<p><strong>Head:</strong> ${item.head_note}</p>` : ''}${item.heart_note ? `<p><strong>Heart:</strong> ${item.heart_note}</p>` : ''}${item.base_note ? `<p><strong>Base:</strong> ${item.base_note}</p>` : ''}</div>` : ''}
                    </details>
                  </div>
                </article>
              `}).join('')}
            </div>
          </section>
        `;
      }).join('');

      empty.style.display = filtered.length ? 'none' : 'block';
      totalCount.textContent = filtered.length;
      syncFilterUi(filtered.length);
    }

    search.addEventListener('input', render);
    categoryChips.addEventListener('click', event => {
      const button = event.target.closest('[data-category]');
      if (!button || button.disabled) return;
      categoryFilter.value = button.dataset.category;
      render();
    });
    confidenceChips.addEventListener('click', event => {
      const button = event.target.closest('[data-confidence]');
      if (!button || button.disabled) return;
      statusFilter.value = button.dataset.confidence;
      render();
    });
    brandFilter.addEventListener('change', () => {
      brandFilterMenu.open = false;
      render();
    });
    clearCatalogueFilters.addEventListener('click', () => {
      search.value = '';
      categoryFilter.value = 'all';
      brandFilter.value = 'all';
      statusFilter.value = 'all';
      brandFilterMenu.open = false;
      render();
    });
    catalogue.addEventListener('click', event => {
      const button = event.target.closest('[data-add-item]');
      if (!button) return;
      addToSelection(button.closest('.card'));
    });
    selectionList.addEventListener('click', event => {
      const item = event.target.closest('[data-selection-key]');
      if (!item) return;
      const key = item.dataset.selectionKey;
      const qtyButton = event.target.closest('[data-qty-change]');
      if (qtyButton) changeQuantity(key, Number(qtyButton.dataset.qtyChange));
      if (event.target.closest('[data-remove-item]')) removeSelection(key);
    });
    clearSelection.addEventListener('click', () => {
      selectedItems = [];
      renderSelection();
    });
    function fallbackCopy(text) {
      const area = document.createElement('textarea');
      area.value = text;
      area.setAttribute('readonly', '');
      area.style.position = 'fixed';
      area.style.left = '-9999px';
      document.body.appendChild(area);
      area.select();
      const copied = document.execCommand('copy');
      area.remove();
      if (!copied) window.prompt('Copy your list:', text);
    }

    copySelection.addEventListener('click', async () => {
      const text = selectionText();
      try {
        if (!navigator.clipboard) throw new Error('Clipboard unavailable');
        await navigator.clipboard.writeText(text);
        copySelection.textContent = 'Copied';
        setTimeout(() => { copySelection.textContent = 'Copy list'; }, 1200);
      } catch (error) {
        fallbackCopy(text);
        copySelection.textContent = 'Copied';
        setTimeout(() => { copySelection.textContent = 'Copy list'; }, 1200);
      }
    });
    menuButtons.forEach(button => {
      button.addEventListener('click', () => {
        setPage(button.dataset.page);
      });
    });
    updateFilterOptions();
    renderSelection();
    render();
    setPage('perfumes');
  </script>
</body>
</html>
